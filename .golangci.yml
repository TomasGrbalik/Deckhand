# yaml-language-server: $schema=https://golangci-lint.run/jsonschema/golangci.jsonschema.json
version: "2"

run:
  timeout: 5m
  relative-path-mode: gomod
  tests: true
  modules-download-mode: readonly

linters:
  default: standard  # govet, errcheck, staticcheck, unused, ineffassign, copyloopvar
  enable:
    # Linting & style (Dimension 2)
    - revive
    - misspell
    - dupword
    - nolintlint
    - predeclared
    - gocritic
    # Type safety (Dimension 3)
    - exhaustive
    - nilerr
    - errorlint
    - forcetypeassert
    - gosec
    # Complexity (Dimension 5)
    - gocyclo
    - gocognit
    - funlen
    - nestif
    # Dead code & modernization (Dimension 6)
    - unparam
    - wastedassign
    - modernize
    - exptostd
    - intrange
    # Architecture & imports (Dimension 8)
    - depguard
    # Additional
    - unconvert
    - usestdlibvars
    - usetesting
    - thelper
    - perfsprint

  settings:
    revive:
      enable-default-rules: true
      rules:
        - name: exported
          arguments: [checkPrivateReceivers]
        - name: unused-parameter
          arguments:
            - allowRegex: "^_"
        - name: package-comments
          disabled: true  # Dimension 7 not yet enabled
        - name: context-as-argument
        - name: error-return
        - name: error-strings
        - name: indent-error-flow
        - name: superfluous-else
        - name: unreachable-code
        - name: redefines-builtin-id

    staticcheck:
      checks:
        - "all"
        - "-ST1000"  # Package comments — Dimension 7 not yet enabled

    govet:
      enable-all: true
      disable: [fieldalignment]

    exhaustive:
      default-signifies-exhaustive: true

    errcheck:
      check-type-assertions: true

    errorlint:
      errorf: true
      asserts: true
      comparison: true

    gocyclo:
      min-complexity: 20

    gocognit:
      min-complexity: 30

    funlen:
      lines: 80
      statements: 50
      ignore-comments: true

    nestif:
      min-complexity: 5

    gosec:
      excludes: [G101]

    depguard:
      rules:
        main:
          deny:
            - pkg: "math/rand$"
              desc: "Use math/rand/v2 or crypto/rand"
            - pkg: "io/ioutil"
              desc: "Deprecated since Go 1.16"
            - pkg: "github.com/pkg/errors"
              desc: "Use fmt.Errorf with %w"

    misspell:
      locale: US

    perfsprint:
      int-conversion: true
      err-error: true

  exclusions:
    generated: lax
    warn-unused: true
    presets:
      - std-error-handling
      - common-false-positives
    rules:
      - path: "_test\\.go"
        linters: [gocyclo, gocognit, funlen, gosec, nestif, unparam]
    paths:
      - ".*\\.pb\\.go$"
      - ".*_mock\\.go$"
      - "vendor/"

formatters:
  enable:
    - gofumpt
    - goimports
    - gci
  settings:
    gci:
      sections: [standard, default, localmodule]
      custom-order: true
  exclusions:
    generated: lax
    paths: [".*\\.pb\\.go$", "vendor/"]

output:
  formats:
    text:
      print-linter-name: true
      colors: true
  sort-order: [linter, severity, file]
  show-stats: true

severity:
  default: warning
  rules:
    - linters: [gosec]
      severity: error
    - linters: [govet, staticcheck]
      severity: error
    - linters: [misspell, dupword]
      severity: info
